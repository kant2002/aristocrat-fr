        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const alphabetLength = alphabet.length;

        function isLetter(char) {
            return RegExp(/^\p{L}/,'u').test(char)
            return char >= 'A' && char <= 'Z';
        }

        function generateRandomKey() {
            let shuffled = alphabet.split('');

            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            for (let i = 0; i < alphabetLength; i++) {
                if (shuffled[i] === alphabet[i]) {
                    const swapIdx = (i + 1) % alphabetLength;
                    [shuffled[i], shuffled[swapIdx]] = [shuffled[swapIdx], shuffled[i]];
                }
            }

            let key = {};
            for (let i = 0; i < alphabetLength; i++) {
                key[alphabet[i]] = shuffled[i];
            }
            return key;
        }

        function encrypt(text, key) {
            return text.toUpperCase().split('').map(char => {
                if (isLetter(char)) {
                    return key[char];
                }
                return char;
            }).join('');
        }

        function calculateFrequency(text) {
            let freq = {};
            for (let i = 0; i < alphabetLength; i++) {
                freq[alphabet[i]] = 0;
            }
            for (let char of text.toUpperCase()) {
                if (isLetter(char)) {
                    freq[char]++;
                }
            }
            return freq;
        }

                    } else {
                        html += `<span class="cipher-letter uppercase">${char}</span>`;
                    }

                    html += `<span class="cipher-letter space"> </span>`;
                } else {
                    html += `<span class="cipher-letter punctuation">${char}</span>`;
                }
            }

            display.innerHTML = html;
        }

                    <div class="freq-count">${count > 0 ? count : ''}</div>
                    <input type="text"
                           class="freq-input ${zeroClass}"
                           maxlength="1"
                           data-cipher="${letter}"
                           value="${userGuesses[letter] || ''}"
                           oninput="handleInput(this)"
                           onkeydown="handleKeydown(event, this)">
                `;

                row.appendChild(item);
            }
        }

        function handleInput(input) {
            const cipher = input.dataset.cipher;
            const value = input.value.toUpperCase();

            if (value && (!isLetter(value))) {
                input.value = '';
                return;
            }

            if (value) {
                userGuesses[cipher] = value;
                input.classList.add('filled');
            } else {
                delete userGuesses[cipher];
                input.classList.remove('filled');
            }

            updateDisplay();
            checkSolved();
        }

        function handleKeydown(event, input) {
            if (event.key === 'Tab' || event.key === 'Enter') {
                return;
            }
        }

        function newCipher() {
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            currentPlaintext = quote.text.toUpperCase();
            currentKey = generateRandomKey();

            reverseKey = {};
            for (let [p, c] of Object.entries(currentKey)) {
                reverseKey[c] = p;
            }

            currentCiphertext = encrypt(quote.text, currentKey);
            userGuesses = {};
            currentAuthor = quote.author;

            document.getElementById('quoteAuthor').textContent = `— ${currentAuthor}`;
            document.getElementById('answerText').textContent = currentPlaintext;
            document.getElementById('answerSource').textContent = `— ${quote.author}`;
            document.getElementById('answerSection').classList.remove('visible');
            document.getElementById('hintSection').classList.remove('visible');

            // Reset and start timer
            stopTimer();
            timerSeconds = 0;
            puzzleSolved = false;
            updateTimerDisplay();
            document.getElementById('timerDisplay').classList.remove('stopped');
            startTimer();

            createFrequencyTable();
            updateDisplay();
        }

        function clearInputs() {
            userGuesses = {};
            const inputs = document.querySelectorAll('.freq-input');
            inputs.forEach(input => {
                input.value = '';
                input.classList.remove('filled');
            });
            updateDisplay();
        }

        function toggleAnswer() {
            const section = document.getElementById('answerSection');
            section.classList.toggle('visible');
        }

        function giveHint() {
            // Trouver les lettres du chiffre qui n'ont pas encore été devinées
            const freq = calculateFrequency(currentCiphertext);
            const unguessed = [];

            for (let letter in freq) {
                if (freq[letter] > 0 && !userGuesses[letter]) {
                    unguessed.push({ cipher: letter, plain: reverseKey[letter], count: freq[letter] });
                }
            }

            if (unguessed.length === 0) {
                document.getElementById('hintText').textContent = "Toutes les lettres ont déjà été devinées!";
                document.getElementById('hintSection').classList.add('visible');
                return;
            }

            // Sélectionner une lettre non devinée aléatoire (en faveur des plus fréquentes)
            unguessed.sort((a, b) => b.count - a.count);
            const hint = unguessed[Math.floor(Math.random() * Math.min(3, unguessed.length))];

            // Remplissage automatique de l'indice
            userGuesses[hint.cipher] = hint.plain;

            // Mettre à jour le champ de saisie
            const input = document.querySelector(`input[data-cipher="${hint.cipher}"]`);
            if (input) {
                input.value = hint.plain;
                input.classList.add('filled');
            }

            document.getElementById('hintText').innerHTML =
                `<span class="hint-letter">${hint.cipher}</span> = <span class="hint-letter">${hint.plain}</span>`;
            document.getElementById('hintSection').classList.add('visible');

            updateDisplay();
            checkSolved();
        }

        // Fonctions de minuterie
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            document.getElementById('timerDisplay').textContent = formatTime(timerSeconds);
        }

        function startTimer() {
            if (timerRunning || puzzleSolved) return;
            timerRunning = true;
            document.getElementById('timerToggleBtn').textContent = 'Pause';
            timerInterval = setInterval(() => {
                timerSeconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            timerRunning = false;
            document.getElementById('timerToggleBtn').textContent = 'Continuer';
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function toggleTimer() {
            if (puzzleSolved) return;
            if (timerRunning) {
                stopTimer();
            } else {
                startTimer();
            }
        }

        function resetTimer() {
            stopTimer();
            timerSeconds = 0;
            puzzleSolved = false;
            updateTimerDisplay();
            document.getElementById('timerDisplay').classList.remove('stopped');
            document.getElementById('timerToggleBtn').textContent = 'Pause';
            startTimer();
        }

        function checkSolved() {
            if (puzzleSolved) return;

            // Vérifier que toutes les lettres du chiffre sont correctement devinées
            const freq = calculateFrequency(currentCiphertext);

            for (let letter in freq) {
                if (freq[letter] > 0) {
                    if (!userGuesses[letter] || userGuesses[letter] !== reverseKey[letter]) {
                        return false;
                    }
                }
            }

            // Énigme résolue!
            puzzleSolved = true;
            stopTimer();
            document.getElementById('timerDisplay').classList.add('stopped');
            document.getElementById('timerToggleBtn').textContent = 'Terminé!';
            return true;
        }

        window.onload = newCipher;
    </script>
</body>
</html>
